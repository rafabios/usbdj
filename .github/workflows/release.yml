name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release, por exemplo v0.1.0. Deixe vazio para usar pyproject.toml."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}".Trim()
            if (-not $tag) {
              $pyproject = Get-Content pyproject.toml -Raw
              if ($pyproject -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
                throw "Could not find project.version in pyproject.toml"
              }
              $tag = $Matches[1]
            }
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Tag must look like v0.1.0"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests

      - name: Build executable
        shell: pwsh
        run: pyinstaller --clean --noconfirm packaging/usbdj.spec

      - name: Prepare release assets
        id: asset
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          $source = "dist\USB-DJ-Formatter.exe"
          $versioned = "dist\USB-DJ-Formatter-$version.exe"
          $latest = "dist\USB-DJ-Formatter-latest.exe"
          if (-not (Test-Path $source)) {
            throw "Build output not found: $source"
          }
          Copy-Item -Force $source $versioned
          Copy-Item -Force $source $latest
          Remove-Item -Force $source
          "versioned_path=$versioned" >> $env:GITHUB_OUTPUT
          "latest_path=$latest" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: USB-DJ-Formatter
          path: |
            ${{ steps.asset.outputs.versioned_path }}
            ${{ steps.asset.outputs.latest_path }}

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $tag = "${{ steps.release.outputs.tag }}"
          $existing = git rev-parse -q --verify "refs/tags/$tag"
          if ($LASTEXITCODE -eq 0) {
            $head = git rev-parse HEAD
            if ($existing -ne $head) {
              throw "Tag $tag already exists and points to $existing, not current commit $head."
            }
            Write-Host "Tag $tag already exists on the current commit."
          } else {
            git tag $tag
            git push origin $tag
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: USB DJ Formatter ${{ steps.release.outputs.tag }}
          files: |
            ${{ steps.asset.outputs.versioned_path }}
            ${{ steps.asset.outputs.latest_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
